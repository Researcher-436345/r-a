services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: researcher
      POSTGRES_PASSWORD: researcher
      POSTGRES_DB: researcher
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researcher -d researcher"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"
    ports:
      # Host 9000/9002 often clash with Cursor — keep 9002 for API
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data

  migrate:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://researcher:researcher@postgres:5432/researcher
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/migrations/migrate.sh"]
    restart: "no"

  api:
    build:
      context: ./backend
    ports:
      - "8080:8000"
    env_file:
      - .env
    environment:
      HTTP_ADDR: ":8000"
      DATABASE_URL: postgres://researcher:researcher@postgres:5432/researcher
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9002
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: papers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://researcher:researcher@postgres:5432/researcher
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9002
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: papers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    entrypoint: ["worker"]

volumes:
  postgres_data:
  minio_data:
